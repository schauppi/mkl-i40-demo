<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1d2b" />
      <stop offset="100%" stop-color="#13111d" />
    </linearGradient>
    <linearGradient id="laneA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2e2a3d" />
      <stop offset="100%" stop-color="#252235" />
    </linearGradient>
    <linearGradient id="laneB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a3044" />
      <stop offset="100%" stop-color="#20273a" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8f8f2" />
    </marker>
    <style>
      .title { fill: #f8f8f2; font-family: "Arial", sans-serif; font-size: 42px; font-weight: 700; }
      .subtitle { fill: #bd93f9; font-family: "Arial", sans-serif; font-size: 23px; font-weight: 700; }
      .laneTitle { fill: #f8f8f2; font-family: "Arial", sans-serif; font-size: 27px; font-weight: 700; }
      .stepTitle { fill: #f8f8f2; font-family: "Arial", sans-serif; font-size: 20px; font-weight: 700; }
      .stepBody { fill: #e8e8ec; font-family: "Arial", sans-serif; font-size: 17px; }
      .chip { fill: #50fa7b; font-family: "Arial", sans-serif; font-size: 16px; font-weight: 700; }
      .chipWarn { fill: #ffb86c; font-family: "Arial", sans-serif; font-size: 16px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)" />

  <text x="56" y="76" class="title">Big Picture: Goal of This Course</text>
  <text x="56" y="118" class="subtitle">Train a predictive maintenance model and serve it as a Docker Compose endpoint</text>

  <rect x="48" y="150" width="1304" height="258" rx="18" fill="url(#laneA)" stroke="#3e3857" stroke-width="2" />
  <text x="78" y="192" class="laneTitle">1) Training Pipeline</text>

  <rect x="84" y="222" width="270" height="154" rx="14" fill="#3a3553" stroke="#5d547f" stroke-width="2" />
  <text x="102" y="254" class="stepTitle">Historical Sensor Data</text>
  <text x="102" y="286" class="stepBody">Vibration, temperature, pressure</text>
  <text x="102" y="314" class="stepBody">with known machine states/failures</text>
  <text x="102" y="347" class="chip">Input for learning</text>

  <rect x="392" y="222" width="270" height="154" rx="14" fill="#3a3553" stroke="#5d547f" stroke-width="2" />
  <text x="410" y="254" class="stepTitle">Feature Engineering</text>
  <text x="410" y="286" class="stepBody">Windowing, cleaning, labels</text>
  <text x="410" y="314" class="stepBody">turn raw signals into model-ready data</text>
  <text x="410" y="347" class="chip">Training dataset</text>

  <rect x="700" y="222" width="270" height="154" rx="14" fill="#3a3553" stroke="#5d547f" stroke-width="2" />
  <text x="718" y="254" class="stepTitle">Train + Validate Model</text>
  <text x="718" y="286" class="stepBody">Predict if machine will fail soon</text>
  <text x="718" y="314" class="stepBody">evaluate precision/recall and stability</text>
  <text x="718" y="347" class="chip">Best model selected</text>

  <rect x="1008" y="222" width="308" height="154" rx="14" fill="#3a3553" stroke="#5d547f" stroke-width="2" />
  <text x="1026" y="254" class="stepTitle">Export Model Artifact</text>
  <text x="1026" y="286" class="stepBody">Persist model + preprocessing pipeline</text>
  <text x="1026" y="314" class="stepBody">for reproducible serving in production</text>
  <text x="1026" y="347" class="chip">Ready for deployment</text>

  <line x1="354" y1="299" x2="384" y2="299" stroke="#f8f8f2" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="662" y1="299" x2="692" y2="299" stroke="#f8f8f2" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="970" y1="299" x2="999" y2="299" stroke="#f8f8f2" stroke-width="3" marker-end="url(#arrow)" />

  <rect x="48" y="434" width="1304" height="278" rx="18" fill="url(#laneB)" stroke="#385270" stroke-width="2" />
  <text x="78" y="476" class="laneTitle">2) Deployment + Inference Pipeline</text>

  <rect x="84" y="506" width="290" height="170" rx="14" fill="#2f3f5d" stroke="#5072a0" stroke-width="2" />
  <text x="102" y="538" class="stepTitle">Docker Image</text>
  <text x="102" y="570" class="stepBody">Bundle model artifact + API code</text>
  <text x="102" y="598" class="stepBody">into a portable inference service</text>
  <text x="102" y="631" class="chipWarn">Containerized runtime</text>

  <rect x="412" y="506" width="290" height="170" rx="14" fill="#2f3f5d" stroke="#5072a0" stroke-width="2" />
  <text x="430" y="538" class="stepTitle">Docker Compose</text>
  <text x="430" y="570" class="stepBody">Spin up service stack</text>
  <text x="430" y="598" class="stepBody">with one command for local/prod setup</text>
  <text x="430" y="631" class="chipWarn">Repeatable deployment</text>

  <rect x="740" y="506" width="290" height="170" rx="14" fill="#2f3f5d" stroke="#5072a0" stroke-width="2" />
  <text x="758" y="538" class="stepTitle">Endpoint /predict</text>
  <text x="758" y="570" class="stepBody">Receives live sensor measurements</text>
  <text x="758" y="598" class="stepBody">from machines or edge gateways</text>
  <text x="758" y="631" class="chipWarn">Real-time input</text>

  <rect x="1068" y="506" width="248" height="170" rx="14" fill="#2f3f5d" stroke="#5072a0" stroke-width="2" />
  <text x="1086" y="538" class="stepTitle">Prediction Output</text>
  <text x="1086" y="570" class="stepBody">Fail risk score + likely fail</text>
  <text x="1086" y="598" class="stepBody">classification for maintenance action</text>
  <text x="1086" y="631" class="chipWarn">Decision support</text>

  <line x1="374" y1="583" x2="404" y2="583" stroke="#f8f8f2" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="702" y1="583" x2="732" y2="583" stroke="#f8f8f2" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="1030" y1="583" x2="1060" y2="583" stroke="#f8f8f2" stroke-width="3" marker-end="url(#arrow)" />

  <line x1="1162" y1="376" x2="1162" y2="496" stroke="#f8f8f2" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)" />
  <text x="1178" y="436" class="stepBody">Model artifact goes to serving stack</text>
</svg>
